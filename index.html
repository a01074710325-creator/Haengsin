<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교직원 회의 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <div class="dashboard">
        <div class="widget clock-widget">
            <div class="analog-clock">
                <div class="hand hour" id="hour-hand"></div>
                <div class="hand minute" id="min-hand"></div>
                <div class="hand second" id="sec-hand"></div>
                <div class="center-dot"></div>
                <div class="number n12">12</div>
                <div class="number n3">3</div>
                <div class="number n6">6</div>
                <div class="number n9">9</div>
            </div>
        </div>

        <div class="widget qr-widget">
            <p class="widget-title">연수 등록부</p>
            <div class="qr-image-wrapper">
                <img id="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=Welcome" alt="QR Code">
            </div>
        </div>

        <div class="main-card">
            <h1 id="meeting-title">교직원 회의</h1>
            <ul id="agenda-list" class="agenda-list">
                </ul>
        </div>

        <div class="music-area">
            <div id="youtube-player" style="display: none;"></div>
            <button id="music-toggle" class="system-btn">
                <span id="music-icon">🎵</span> <span id="music-status">음악 켜기</span>
            </button>
        </div>

        <div class="admin-area">
            <button id="open-admin" class="icon-btn">⚙️ 설정</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-card">
            <h2>설정</h2>
            
            <div class="input-group">
                <label>연수 등록부 QR (이미지 업로드)</label>
                <input type="file" id="admin-qr-upload" accept="image/*">
            </div>
            
            <div class="input-group">
                <label>회의 제목</label>
                <input type="text" id="admin-title-input" placeholder="회의 제목을 입력하세요">
            </div>
            
            <div class="input-group">
                <label>회의 순서 (줄바꿈으로 구분)</label>
                <textarea id="admin-agenda-input" rows="4" placeholder="1. 개회&#10;2. 안건 토의"></textarea>
            </div>
            
            <div class="input-group">
                <label>유튜브 배경음악 링크</label>
                <input type="text" id="admin-yt-input" placeholder="유튜브 영상 주소(URL) 전체 입력">
            </div>
            
            <div class="modal-actions">
                <button id="close-admin" class="btn-secondary">취소</button>
                <button id="save-admin" class="btn-primary">저장</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
