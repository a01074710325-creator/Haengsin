<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2026 교직원 회의 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard patchwork-bg">
        <div class="side-col left">
            <div class="patch patch-clock">
                <div class="analog-clock">
                    <div class="hand hour" id="hour-hand"></div>
                    <div class="hand minute" id="min-hand"></div>
                    <div class="hand second" id="sec-hand"></div>
                </div>
                <div class="patch-label">현재 시간</div>
            </div>
            <button id="open-admin" class="icon-btn">⚙️ 설정</button>
        </div>

        <div class="main-col">
            <div class="patch patch-title"><h1 id="meeting-title">2026 교직원 회의</h1></div>
            <div class="patch patch-agenda">
                <div class="agenda-content">
                    <h2># 회의 순서</h2>
                    <ul id="agenda-list" class="agenda-list"></ul>
                </div>
                <div class="photo-content">
                    <div class="cute-frame" id="cute-frame" style="display:none;">
                        <img id="dashboard-photo" src="" alt="회의 사진">
                    </div>
                </div>
            </div>
        </div>

        <div class="side-col right">
            <div id="qr-wrapper" class="qr-col"></div>
            <button id="music-toggle" class="icon-btn">🎵 음악 재생</button>
            <div id="youtube-player" style="position: absolute; left: -9999px;"></div>
        </div>
    </div>
    
    <div id="admin-modal" class="modal">...</div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
