<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교직원 회의 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard felt-dark stitch-white">
        
        <div class="main-card felt-light stitch-brown">
            
            <header class="card-header">
                <div class="clock-area">
                    <div id="digital-clock">00:00:00</div>
                </div>
                <div class="qr-area" id="qr-wrapper">
                    </div>
            </header>

            <main class="card-center">
                <h1 id="meeting-title">교직원 회의</h1>
                
                <div class="music-control">
                    <div id="youtube-player" class="hidden-player"></div>
                    <button id="music-toggle" class="simple-icon-btn" title="음악 재생/정지">
                        <svg id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="2" width="20" height="20" rx="7"/>
                            <polygon points="10,8 16,12 10,16"/>
                        </svg>
                        <svg id="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none;">
                            <rect x="2" y="2" width="20" height="20" rx="7"/>
                            <line x1="9" y1="8" x2="9" y2="16"/>
                            <line x1="15" y1="8" x2="15" y2="16"/>
                        </svg>
                    </button>
                </div>
            </main>

            <footer class="card-footer">
                <div class="agenda-box">
                    <h3>회의 순서</h3>
                    <div class="agenda-pills" id="agenda-list">
                        </div>
                </div>
            </footer>

            <button id="open-admin" class="admin-open-btn">⚙️</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-card">
            <h2>⚙️ 회의 설정 관리</h2>
            <div class="modal-scroll-area">
                
                <div class="input-group">
                    <label>🔠 전체 글자 크기 조절</label>
                    <input type="range" id="admin-font-size" min="14" max="32" value="18">
                </div>

                <div class="input-group">
                    <label>회의 제목</label>
                    <input type="text" id="admin-title-input" placeholder="교직원 회의">
                </div>
                
                <div class="input-group">
                    <label>회의 순서 (가로 캡슐형으로 표시됨, 줄바꿈 구분)</label>
                    <textarea id="admin-agenda-input" rows="3" placeholder="1. 교장선생님 말씀&#10;2. 안건 토의"></textarea>
                </div>

                <div class="qr-setting-box">
                    <h4>📌 첫 번째 QR</h4>
                    <input type="text" id="admin-qr-title-1" placeholder="제목 (예: 연수 등록부)">
                    <input type="file" id="admin-qr-upload-1" accept="image/*">
                </div>
                
                <div class="qr-setting-box">
                    <h4>📌 두 번째 QR</h4>
                    <input type="text" id="admin-qr-title-2" placeholder="제목 (예: 만족도 조사)">
                    <input type="file" id="admin-qr-upload-2" accept="image/*">
                </div>

                <div class="qr-setting-box">
                    <h4>📌 세 번째 QR</h4>
                    <input type="text" id="admin-qr-title-3" placeholder="비워두면 표시되지 않습니다">
                    <input type="file" id="admin-qr-upload-3" accept="image/*">
                </div>
                
                <div class="input-group" style="margin-top: 15px;">
                    <label>유튜브 배경음악 링크</label>
                    <input type="text" id="admin-yt-input" placeholder="유튜브 영상 주소(URL) 전체 입력">
                </div>
            </div>
            
            <div class="modal-actions">
                <button id="close-admin" class="btn-secondary">닫기</button>
                <button id="save-admin" class="btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
